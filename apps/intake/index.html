<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteForge Factory Intake</title>

<style>

:root{
--bg:#0b1020;
--panel:#121933;
--panel2:#182142;
--text:#eef2ff;
--muted:#aab4d6;
--line:rgba(255,255,255,0.08);
--accent:#7c9cff;
--accent2:#9b7cff;
--user:#24325f;
--assistant:#171f3d;
--success:#1c8f5f;
--shadow:0 12px 40px rgba(0,0,0,0.3);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;
background:
radial-gradient(circle at top left,rgba(124,156,255,0.18),transparent 30%),
radial-gradient(circle at top right,rgba(155,124,255,0.14),transparent 25%),
var(--bg);
color:var(--text);
min-height:100vh;
}

.app{
display:grid;
grid-template-columns:1.25fr .75fr;
gap:20px;
max-width:1400px;
margin:0 auto;
padding:24px;
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));
border:1px solid var(--line);
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.header{padding:22px 24px;margin-bottom:18px}

h1{margin:0 0 6px;font-size:28px}

.sub{color:var(--muted);font-size:15px}

.chat{display:flex;flex-direction:column;min-height:68vh}

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
max-width:82%;
padding:14px 16px;
border-radius:16px;
font-size:15px;
line-height:1.5;
border:1px solid var(--line);
white-space:pre-wrap;
}

.msg.assistant{align-self:flex-start;background:var(--assistant)}
.msg.user{align-self:flex-end;background:var(--user)}
.msg.system{
align-self:center;
max-width:100%;
color:var(--muted);
background:rgba(255,255,255,.03);
font-size:13px;
}

.composer{
border-top:1px solid var(--line);
padding:16px;
display:grid;
gap:12px;
}

.quick-actions{display:flex;flex-wrap:wrap;gap:8px}

button{
border:0;
border-radius:12px;
padding:11px 14px;
font-size:14px;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
font-weight:600;
}

.btn-secondary{
background:rgba(255,255,255,.08);
color:white;
border:1px solid var(--line);
}

.btn-success{
background:var(--success);
color:white;
font-weight:600;
}

input,textarea{
width:100%;
background:var(--panel2);
color:var(--text);
border:1px solid var(--line);
border-radius:14px;
padding:14px;
font:inherit;
}

textarea{min-height:96px}

.side{display:flex;flex-direction:column;gap:18px}

.panel{padding:18px}

.summary-item{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.04);
border:1px solid var(--line);
margin-bottom:10px;
}

.summary-label{
font-size:11px;
color:var(--muted);
text-transform:uppercase;
}

.summary-value{font-size:14px}

.result{
background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:14px;
padding:12px;
font-size:13px;
max-height:320px;
overflow:auto;
white-space:pre-wrap;
}

.hidden{display:none}

</style>
</head>

<body>

<div class="app">

<div>

<div class="card header">
<h1>SiteForge Factory</h1>
<p class="sub">Conversational website intake</p>

<input id="businessNameInput" placeholder="Business name">
<input id="clientEmailInput" placeholder="Email (optional)">

<button id="startBtn" class="btn-primary">Start Intake</button>

<p id="phaseLabel">Waiting to begin</p>

</div>

<div class="card chat">

<div id="messages" class="messages">
<div class="msg system">Enter your business name and start when ready.</div>
</div>

<div class="composer">

<div id="quickActions" class="quick-actions"></div>

<textarea id="messageInput" placeholder="Type your answer..." disabled></textarea>

<button id="sendBtn" class="btn-primary" disabled>Send</button>
<button id="buildBtn" class="btn-success hidden">Build Preview</button>

</div>

</div>

</div>

<div class="side">

<div class="card panel">
<h3>Strategy Summary</h3>

<div class="summary-item">
<div class="summary-label">Goal</div>
<div id="summaryGoal" class="summary-value">—</div>
</div>

<div class="summary-item">
<div class="summary-label">Audience</div>
<div id="summaryAudience" class="summary-value">—</div>
</div>

<div class="summary-item">
<div class="summary-label">Offer</div>
<div id="summaryOffer" class="summary-value">—</div>
</div>

<div class="summary-item">
<div class="summary-label">Vibe</div>
<div id="summaryVibe" class="summary-value">—</div>
</div>

<div class="summary-item">
<div class="summary-label">CTA</div>
<div id="summaryCta" class="summary-value">—</div>
</div>

</div>

<div class="card panel">
<h3>Status</h3>
<div id="statusBox">No intake session yet.</div>
</div>

<div class="card panel">
<h3>Result</h3>
<div id="resultBox" class="result">Nothing generated yet.</div>
</div>

</div>

</div>


<script>

const state={
sessionId:"",
intakeState:null,
phase:"",
pending:false
}

const els={
businessNameInput:document.getElementById("businessNameInput"),
clientEmailInput:document.getElementById("clientEmailInput"),
startBtn:document.getElementById("startBtn"),
phaseLabel:document.getElementById("phaseLabel"),
messages:document.getElementById("messages"),
quickActions:document.getElementById("quickActions"),
messageInput:document.getElementById("messageInput"),
sendBtn:document.getElementById("sendBtn"),
buildBtn:document.getElementById("buildBtn"),
statusBox:document.getElementById("statusBox"),
resultBox:document.getElementById("resultBox")
}


function addMessage(role,content){

const div=document.createElement("div")
div.className="msg "+role
div.textContent=content

els.messages.appendChild(div)
els.messages.scrollTop=els.messages.scrollHeight

}


async function api(url,payload){

const res=await fetch(url,{
method:"POST",
headers:{"content-type":"application/json"},
body:JSON.stringify(payload)
})

const data=await res.json()

if(!res.ok || data.ok===false){
throw new Error(data.error || "Request failed")
}

return data

}


async function startIntake(){

const businessName=els.businessNameInput.value.trim()
const clientEmail=els.clientEmailInput.value.trim()

const data=await api("/api/intake-start",{businessName,clientEmail})

state.sessionId=data.session_id
state.intakeState=data.state
state.phase=data.phase

els.phaseLabel.textContent="Phase: "+data.phase

els.messages.innerHTML=""

data.messages.forEach(m=>{
addMessage(m.role,m.content)
})

els.messageInput.disabled=false
els.sendBtn.disabled=false

}


async function sendAnswer(){

const answer=els.messageInput.value.trim()

if(!answer) return

addMessage("user",answer)

els.messageInput.value=""

const data=await api("/api/intake-next",{
session_id:state.sessionId,
answer,
state:state.intakeState
})

state.intakeState=data.state
state.phase=data.phase

addMessage("assistant",data.message.content)

if(data.readiness?.can_generate_now){
els.buildBtn.classList.remove("hidden")
}

}


async function buildPreview(){

const data=await api("/api/intake-complete",{
session_id:state.sessionId,
state:state.intakeState
})

els.resultBox.textContent=JSON.stringify(data,null,2)

}


els.startBtn.onclick=startIntake
els.sendBtn.onclick=sendAnswer
els.buildBtn.onclick=buildPreview

</script>

</body>
</html>
