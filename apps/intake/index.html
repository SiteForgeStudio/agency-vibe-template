<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SiteForge Factory</title>

<style>
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  margin:0;
  background:#0f1324;
  color:white;
}

.app{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

.chat{
  background:#161c33;
  border-radius:12px;
  padding:20px;
  height:70vh;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:10px;
  line-height:1.5;
}

.msg.assistant{
  background:#1f2750;
  align-self:flex-start;
}

.msg.user{
  background:#31409a;
  align-self:flex-end;
}

.msg.system{
  background:#222;
  color:#aaa;
  align-self:center;
}

.composer{
  border-top:1px solid #2c3567;
  padding-top:10px;
  margin-top:10px;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #2c3567;
  background:#0f1324;
  color:white;
}

button{
  margin-top:8px;
  padding:10px 14px;
  border-radius:8px;
  border:none;
  background:#6b8cff;
  color:white;
  cursor:pointer;
}

button.secondary{
  background:#2c3567;
}

.quick-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.summary{
  margin-top:20px;
  background:#161c33;
  padding:14px;
  border-radius:10px;
}

.preview{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<h2>SiteForge Factory</h2>

<div class="chat">

<div id="messages" class="messages">
<div class="msg system">Enter your business name to begin.</div>
</div>

<div class="composer">

<div id="quickActions" class="quick-actions"></div>

<textarea id="messageInput" placeholder="Type your answer..."></textarea>

<button id="sendBtn">Send</button>

<button id="buildBtn" class="secondary" style="display:none;">
Build Preview
</button>

</div>

</div>

<div class="summary">
<strong>Strategy Summary</strong>
<pre id="summary"></pre>
</div>

<div class="preview">
<strong>Status:</strong>
<span id="status">Waiting to begin</span>
<br>
<a id="previewLink" target="_blank"></a>
</div>

</div>

<script>

const state={
sessionId:null,
intakeState:null,
buildStarted:false
}

const messagesEl=document.getElementById("messages")
const messageInput=document.getElementById("messageInput")
const sendBtn=document.getElementById("sendBtn")
const quickActions=document.getElementById("quickActions")
const summary=document.getElementById("summary")
const status=document.getElementById("status")
const previewLink=document.getElementById("previewLink")
const buildBtn=document.getElementById("buildBtn")

function addMessage(role,text){

const el=document.createElement("div")
el.className="msg "+role
el.textContent=text

messagesEl.appendChild(el)

messagesEl.scrollTop=messagesEl.scrollHeight
}

function renderMessages(list){

messagesEl.innerHTML=""

list.forEach(m=>{
addMessage(m.role,m.content)
})
}

function renderQuickActions(message){

quickActions.innerHTML=""

if(!message || !message.options) return

message.options.forEach(opt=>{

const btn=document.createElement("button")

btn.className="secondary"

btn.textContent=opt.label

btn.onclick=()=>{
handleQuickReply(opt)
}

quickActions.appendChild(btn)

})

}

function updateSummary(panel){

summary.textContent=JSON.stringify(panel,null,2)

}

async function api(url,data){

const res=await fetch(url,{
method:"POST",
headers:{'content-type':'application/json'},
body:JSON.stringify(data)
})

const json=await res.json()

if(!json.ok) throw new Error(json.error)

return json

}

async function startIntake(){

const name=messageInput.value.trim()

if(!name) return

const data=await api("/api/intake-start",{
businessName:name
})

state.sessionId=data.session_id
state.intakeState=data.state

renderMessages(data.messages)

renderQuickActions(data.messages.at(-1))

updateSummary(data.summary_panel)

status.textContent="Intake started"

messageInput.value=""
}

async function sendAnswer(answer){

if(!state.sessionId) return

addMessage("user",answer)

messageInput.value=""

quickActions.innerHTML=""

const data=await api("/api/intake-next",{
session_id:state.sessionId,
answer,
state:state.intakeState
})

state.intakeState=data.state

if(data.message){
addMessage("assistant",data.message.content)
}

renderQuickActions(data.message)

updateSummary(data.summary_panel)

status.textContent="Intake progressing..."

if(data.action==="complete"){
buildPreview()
}

}

async function handleQuickReply(option){

const label=option.label || ""
const action=option.action || ""

/*
IMPORTANT FIX

Quick replies now send the label as the answer
instead of only the action token
*/

await sendAnswer(label)

}

async function buildPreview(){

if(state.buildStarted) return

state.buildStarted=true

status.textContent="Generating site..."

const data=await api("/api/intake-complete",{
session_id:state.sessionId,
state:state.intakeState
})

status.textContent="Build dispatched"

if(data.slug){

pollStatus(data.slug)

}

}

async function pollStatus(slug){

const res=await fetch("/api/status?slug="+slug)

const data=await res.json()

if(data.preview_url){

previewLink.href=data.preview_url
previewLink.textContent="Open preview"
status.textContent="Preview deployed"

return
}

setTimeout(()=>pollStatus(slug),5000)

}

sendBtn.onclick=()=>{

const text=messageInput.value.trim()

if(!text) return

if(!state.sessionId){
startIntake()
}else{
sendAnswer(text)
}

}

</script>

</body>
</html>
